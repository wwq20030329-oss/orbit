name: CLI Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/orbit-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/orbit-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn workspace orbit build

    - name: Pack package
      run: yarn workspace orbit pack

    - name: Install packed package globally
      run: |
        PACKAGE_FILE=$(ls packages/orbit-cli/*.tgz)
        npm install -g "./$PACKAGE_FILE"

    - name: Test binary execution
      run: |
        # Test that the binary starts successfully
        echo "Testing orbit --help..."
        timeout 30s orbit --help || {
          echo "Error: orbit --help failed or timed out"
          exit 1
        }

        echo "Testing orbit --version..."
        timeout 10s orbit --version || {
          echo "Error: orbit --version failed or timed out"
          exit 1
        }

        echo "Testing orbit doctor..."
        timeout 30s orbit doctor || {
          echo "Error: orbit doctor failed or timed out"
          exit 1
        }

        echo "Testing orbit daemon status..."
        timeout 10s orbit daemon status || {
          echo "Error: orbit daemon status failed or timed out"
          exit 1
        }

        echo "Smoke test passed on Linux!"

  smoke-test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn workspace orbit build

    - name: Pack package
      run: yarn workspace orbit pack

    - name: Install packed package globally
      shell: cmd
      run: |
        for %%f in (packages\orbit-cli\*.tgz) do npm install -g "%%f"

    - name: Debug npm global installation structure
      shell: cmd
      run: |
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Listing npm prefix directory:
        dir "%NPM_PREFIX%" 2>nul || echo Failed to list NPM_PREFIX
        echo.
        echo Checking for node_modules in npm prefix:
        if exist "%NPM_PREFIX%\node_modules" (
          echo Found node_modules directory
          dir "%NPM_PREFIX%\node_modules" 2>nul
          echo.
          echo Checking for orbit package:
          if exist "%NPM_PREFIX%\node_modules\orbit" (
            echo Found orbit package
            dir "%NPM_PREFIX%\node_modules\orbit" 2>nul
            echo.
            echo Checking for dist directory:
            if exist "%NPM_PREFIX%\node_modules\orbit\dist" (
              echo Found dist directory
              dir "%NPM_PREFIX%\node_modules\orbit\dist" 2>nul
            ) else (
              echo No dist directory found
            )
          ) else (
            echo No orbit package found
          )
        ) else (
          echo No node_modules directory found
        )

    - name: Test binary execution
      shell: cmd
      run: |
        @echo on

        rem Get npm global prefix and add to PATH
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        set PATH=%NPM_PREFIX%;%PATH%
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Current PATH: %PATH%

        rem Debug: Check if orbit exists in various locations
        echo Checking for orbit binary...
        where orbit 2>nul && echo Found orbit in PATH || echo orbit not found in PATH
        if exist "%NPM_PREFIX%\orbit.cmd" echo Found orbit.cmd in NPM_PREFIX
        if exist "%NPM_PREFIX%\node_modules\.bin\orbit.cmd" echo Found orbit.cmd in .bin directory
        dir "%NPM_PREFIX%\*orbit*" 2>nul || echo No orbit files found in NPM_PREFIX

        rem Debug: Check the actual contents and encoding of the installed file
        if exist "%NPM_PREFIX%\orbit.cmd" (
          echo File size and type:
          dir "%NPM_PREFIX%\orbit.cmd"
          echo.
          echo First few lines of the file:
          type "%NPM_PREFIX%\orbit.cmd" | head -5
          echo.
          echo Hex dump of first 50 bytes to check line endings:
          powershell -Command "Get-Content '%NPM_PREFIX%\orbit.cmd' -Encoding Byte -TotalCount 50 | ForEach-Object { '{0:X2}' -f $_ } | Join-String -Separator ' '"
          echo.
          echo Testing with direct path...
          "%NPM_PREFIX%\orbit.cmd" --help
        ) else (
          echo Testing orbit --help...
          orbit --help
        )
        if errorlevel 1 (
          echo Error: orbit --help failed
          exit /b 1
        )

        rem Test version
        if exist "%NPM_PREFIX%\orbit.cmd" (
          "%NPM_PREFIX%\orbit.cmd" --version
        ) else (
          orbit --version
        )
        if errorlevel 1 (
          echo Error: orbit --version failed
          exit /b 1
        )

        rem Test doctor
        echo Testing orbit doctor...
        if exist "%NPM_PREFIX%\orbit.cmd" (
          "%NPM_PREFIX%\orbit.cmd" doctor
        ) else (
          orbit doctor
        )
        if errorlevel 1 (
          echo Error: orbit doctor failed
          exit /b 1
        )

        rem Test daemon status
        echo Testing orbit daemon status...
        if exist "%NPM_PREFIX%\orbit.cmd" (
          "%NPM_PREFIX%\orbit.cmd" daemon status
        ) else (
          orbit daemon status
        )
        if errorlevel 1 (
          echo Error: orbit daemon status failed
          exit /b 1
        )

        echo Smoke test passed on Windows!

# We don't need a smoke test for macOS because most contributors are developing on macOS.
